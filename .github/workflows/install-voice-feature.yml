name: Verify voice feature

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate voice integration
        run: |
          node --check public/market.js
          node --check public/notes.js
          node --check public/voice.js
          grep -Fq '<script src="/notes.js?v=1"></script>' public/index.html
          grep -Fq '<script src="/voice.js?v=2"></script>' public/index.html
